name: CI

on:
  pull_request:
    branches: [main]

permissions:
  id-token: write      # Required for OIDC
  contents: read
  pull-requests: write # Required to post diff as PR comment

jobs:
  cdk-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install CDK deps
        run: npm ci
        working-directory: cdk

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-flight-tracker
          aws-region: ${{ secrets.AWS_REGION }}

      - name: CDK Synth
        run: npx cdk synth
        working-directory: cdk

      - name: CDK Diff
        run: npx cdk diff --all 2>&1 | tee diff-output.txt
        working-directory: cdk

      - name: Post diff as PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const diff = fs.readFileSync('cdk/diff-output.txt', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '## CDK Diff\n```\n' + diff + '\n```'
            });
